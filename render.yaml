services:
  - type: web
    name: jts-beauty-api
    env: node
    rootDir: server
    plan: free
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: FRONTEND_URL
        value: https://saadsheikh5.github.io/ecoms/
      - key: CLIENT_URL
        value: https://saadsheikh5.github.io/ecoms/
      - key: ALLOW_ADMIN_BOOTSTRAP
        value: false
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: TWO_FACTOR_ENCRYPTION_KEY
        sync: false
